[project]
name = "ksivpn-telegram-bot"
version = "1.0.2"
description = "Multifunctional telegram bot for ksiVPN project based on aiogram framework."
authors = [
    {name = "exmanka",email = "exmanka@gmail.com"}
]
license = {text = "BSD-3-Clause"}
readme = "README.md"
requires-python = "~=3.12.0"
dependencies = [
    "aiofiles (==25.1.0)",
    "aiogram (==3.27.0)",
    "apscheduler (==3.11.2)",
    "asyncpg (==0.31.0)",
    "dynaconf (>=3.2.6,<4.0)",
    "g4f (>=0.3.0)",
    "pydantic (==2.12.5)",
    "pyyaml (>=6.0,<7.0)",
    "redis (>=7.4.0,<8.0.0)",
    "aiohttp-socks (>=0.11.0,<0.12)",
    "babel (>=2.16,<3.0)",
]

[tool.poetry]
package-mode = false

[project.urls]
homepage = "https://github.com/exmanka"
repository = "https://github.com/exmanka/ksiVPN-telegram-bot"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
