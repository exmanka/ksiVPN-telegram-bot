[project]
name = "ksivpn-telegram-bot"
version = "1.0.2"
description = "Multifunctional telegram bot for ksiVPN project based on aiogram framework."
authors = [
    {name = "exmanka",email = "exmanka@gmail.com"}
]
license = {text = "BSD-3-Clause"}
readme = "README.md"
requires-python = "~=3.10.0"
dependencies = [
    "aiofiles (==23.2.1)",
    "aiogram (==2.25.1)",
    "aiohttp (==3.8.6)",
    "apscheduler (==3.10.4)",
    "asyncpg (==0.29.0)",
    "g4f (==0.1.9.3)",
    "pydantic (==2.5.2)",
    "pyyaml (>=6.0,<7.0)",
    "redis (>=7.4.0,<8.0.0)",
    "aiohttp-socks (==0.8.4)",
]

[tool.poetry]
package-mode = false

[project.urls]
homepage = "https://github.com/exmanka"
repository = "https://github.com/exmanka/ksiVPN-telegram-bot"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
