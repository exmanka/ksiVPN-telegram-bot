user_authorized:
  messages:
    rules: |-
      <b>Используя сервис, вы соглашаетесь с правилами:</b>

      <b>1. Запрещается делиться конфигурациями с другими людьми.</b>
      Одна конфигурация может быть использована только для одного вашего устройства. При этом для своего пользования вы можете запросить неограниченное число дополнительных конфигураций в рамках разумного.

      <b>2. Запрещается загружать файлы через торрент-клиенты с использованием VPN.</b>
      Однако сами файлы расширения <code>*.torrent</code> скачивать можно.
      <i>Пример: вы хотите скачать фильм, однако сайт, на котором размещены файлы, недоступен из России. Вы включаете VPN, заходите на сайт и загружаете файл film-example.torrent. Далее вы отключаете VPN и приступаете к загрузке самого фильма в вашем торрент-клиенте.</i>

      <b>3. Рекомендуется не использовать VPN, когда в нем нет необходимости.</b>
      Благодаря этому вы не будете испытывать проблем с вашими приложениями.

      ❌ <b>Нарушение правил 1-2 может привести к незамедлительной блокировке пользователя.</b>
