    instructions:
      wireguard:
        android: |-
          ⚙️ <b>Инструкция по установке WireGuard на Android:</b>
          <b>1.</b> Скачать и установить официальное приложение Wireguard (<a href="https://play.google.com/store/apps/details?id=com.wireguard.android">ссылка в Play Market</a>).
          <b>2.</b> После запуска нажать на значок <b>«+»</b> в нижнем правом углу экрана.
          <b>3.</b> Выбрать опцию <b>«Создать из QR-кода»</b>/<b>«Scan from QR code»</b>, разрешить доступ к камере и отсканировать QR-код.
          <b>4.</b> Ввести название Вашего VPN-туннеля! Именование можно задавать любое, но рекомендуется называть туннель страной расположения (Netherlands/Germany/Latvia/USA).

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно нажать на переключатель справа от названия туннеля. В первый раз телефон может выдать уведомление о добавлении нового VPN-соединения — необходимо согласиться.
          <b>2.</b> Для выключения VPN нужно снова изменить положение переключателя.
        ios: |-
          ⚙️ <b>Инструкция по установке WireGuard на IOS:</b>
          <b>1.</b> Скачать и установить официальное приложение Wireguard (<a href="https://apps.apple.com/ru/app/wireguard/id1441195209">ссылка в App Store</a>).
          <b>2.</b> После запуска нажать на значок <b>«+»</b> в нижнем правом углу экрана.
          <b>3.</b> Выбрать опцию <b>«Создать из QR-кода»</b>/<b>«Scan from QR code»</b>, разрешить доступ к камере и отсканировать QR-код.
          <b>4.</b> Ввести название Вашего VPN-туннеля! Именование можно задавать любое, но рекомендуется называть туннель страной расположения (Netherlands/Germany/Latvia/USA).

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно нажать на переключатель справа от названия туннеля. В первый раз телефон может выдать уведомление о добавлении нового VPN-соединения — необходимо согласиться.
          <b>2.</b> Для выключения VPN нужно снова изменить положение переключателя.
        windows: |-
          ⚙️ <b>Инструкция по установке WireGuard на Windows:</b>
          <b>1.</b> Скачать и установить приложение Wireguard (<a href="https://www.wireguard.com/install/">ссылка на официальный сайт</a>).
          <b>2.</b> После запуска нажать на кнопку <b>«Добавить туннель»</b>/<b>«Add tunnel»</b> и выбрать отправленный Вам файл расширения <code>*.conf</code>.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно выбрать туннель и нажать <b>«Подключить»</b>.
          <b>2.</b> Для выключения VPN достаточно нажать <b>«Отключить»</b>.
        macos: |-
          ⚙️ <b>Инструкция по установке WireGuard на macOS:</b>
          <b>1.</b> Скачать и установить официальное приложение Wireguard (<a href="https://apps.apple.com/ru/app/wireguard/id1451685025">ссылка в App Store</a>).
          <b>2.</b> После запуска нажать на кнопку <b>«Добавить туннель»</b>/<b>«Add tunnel»</b> и выбрать отправленный Вам файл расширения <code>*.conf</code>.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно выбрать туннель и нажать <b>«Подключить»</b>.
          <b>2.</b> Для выключения VPN достаточно нажать <b>«Отключить»</b>.
        linux: |-
          ⚙️ <b>Инструкция по установке и использованию WireGuard на GNU/Linux:</b>
          Ой-ой, Вы уже не маленькие, раз используете Linux!
          Отправляю Вам большой респект и ссылку на документацию: https://www.wireguard.com/install/#ubuntu-module-tools

          Подсказки по установки можно найти здесь: https://shrub-coriander-4a3.notion.site/Linux-Mint-Cinnamon-21-1-29cda1060f4d4ab48c483cfa70948e46?pvs=4
