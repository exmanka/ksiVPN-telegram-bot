          ⚙️ <b>Инструкция по установке XTLS-Reality на Android:</b>
          <b>1.</b> Скачать и установить официальное приложение v2rayNG (<a href="https://play.google.com/store/apps/details?id=com.v2ray.ang">ссылка в Play Market</a>).
          <b>2.</b> После запуска нажать на значок <b>«+»</b> рядом с Профилем.
          <b>3.</b> Выбрать пункт <b>«Импорт профиля из QR-кода»</b>, разрешить доступ к камере и отсканировать QR-код.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно нажать на переключатель в правом нижнем углу.
          В первый раз телефон может выдать уведомление о добавлении нового VPN-соединения — необходимо согласиться.
          <b>2.</b> Для выключения VPN нужно снова изменить положение переключателя.
        ios: |-
          ⚙️ <b>Инструкция по установке XTLS-Reality на IOS:</b>
          <b>1.</b> Скачать и установить официальное приложение Streisand (<a href="https://apps.apple.com/ru/app/streisand/id6450534064">ссылка в App Store</a>).
          <b>2.</b> После запуска нажать на значок <b>«+»</b> в верхнем правом углу приложения.
          <b>3.</b> Выбрать пункт <b>«Отсканировать QRCode»</b> из выпадающего меню, разрешить доступ к камере и отсканировать отправленный QR-код.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно нажать на переключатель сверху по центру экрана.
          В первый раз телефон может выдать уведомление о добавлении нового VPN-соединения — необходимо согласиться.
          <b>2.</b> Для выключения VPN нужно снова изменить положение переключателя.
        windows: |-
          ⚙️ <b>Инструкция по установке XTLS-Reality на Windows:</b>
          <b>1.</b> Перейти на последний релиз приложения nekoray <a href="https://github.com/MatsuriDayo/nekoray/releases/tag/3.21">по ссылке</a>.
          <b>2.</b> Скачать версию для Windows.
          <b>3.</b> Распаковать архив (<b>ПКМ по архиву</b> — <b>«Извлечь все...»</b> — <b>«Извлечь»</b>)
          <b>4.</b> В архиве запустить файл <b>nekoray.exe</b>.
          <b>5.</b> При первом запуске Windows уведомит о том, что приложение выпускается неизвестным издателем. Не пугаемся, NekoBox является приложением с открытым исходным кодом. <b>Оно полностью безопасно и не несет никаких вирусов</b>.
          <b>6.</b> Для продолжения нужно нажать <b>«Подробнее»</b> — <b>«Выполнить в любом случае»</b>.
          <b>7.</b> Выбрать в стартовом диалоговом окне пункт <b>«sing-box»</b>.
          <b>8.</b> Скопировать выданную Вам ссылку и зажать <b>Ctrl+V</b> в приложении. Конфигурация добавиться автоматически.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> <u>Перед включением обязательно выбрать пункт <b>«Режим TUN»</b>. Для этого потребуется перезапустить программу от имени администратора.</u>
          <b>2.</b> Включить и выключить VPN можно в самой программе или в трее.
        macos: |-
          ⚙️ <b>Инструкция по установке XTLS-Reality на macOS:</b>
          <b>1.</b> Скачать и установить официальное приложение FoXray (<a href="https://apps.apple.com/ru/app/foxray/id6448898396">ссылка в App Store</a>).
          <b>2.</b> После запуска нажать на значок <b>Блокнота</b> и вставить отправленную Вам ссылку.

          🎉 <b>Инструкция по использованию:</b>
          <b>1.</b> Для включения VPN достаточно нажать на переключатель справа от названия конфигурации.
          В первый раз устройство может выдать уведомление о добавлении нового VPN-соединения — необходимо согласиться.
          <b>2.</b> Для выключения VPN нужно снова изменить положение переключателя.
        linux: |-
          ⚙️ <b>Инструкция по установке и использованию XTLS-Reality на GNU/Linux:</b>
          Ой-ой, Вы уже не маленькие, раз используете Linux!
          Отправляю Вам большой респект и ссылку на документацию: https://github.com/MatsuriDayo/nekoray/tree/3.21
      shadowsocks-2022:
        android: |-
          <b>Протокол Shadowsocks-2022 в данный момент используется только командой тестирования.</b>

          Если Вы читаете данное сообщение, не являясь тестировщиком, значит, администратор ошибся при создании конфигурации. Напишите ему для выяснения проблемы!
        ios: |-
