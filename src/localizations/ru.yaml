other:
  messages:
    hello_message: |-
      👋 <b>Привет! Я бот проекта ksiVPN — безлимитного, быстрого и полностью безопасного VPN-сервиса за 200</b>₽<b>/мес!</b>

      Я помогу сконфигурировать подключение, оплатить подписку, продлить ее бесплатно, а также решить многие другие задачи! При желании, со мной можно даже обсудить <code>человеческие</code> темы!
    more_info: Больше информации о сервисе доступно по нажатию кнопки <b>«О проекте»</b> снизу
    help: |-
      Вы легко можете написать моему создателю при возникновении каких-либо проблем, а также при наличии идей по улучшению моей работы!

      <b>Если я не воспринимаю нажатия на кнопки, сбросьте мое состояние при помощи команды /start</b>
    project_info: |-
      <b>ksiVPN</b> — студенческий проект с открытым исходным кодом, ставший чем-то большим не только для его создателя, но и для большинства клиентов.

      Благодаря упорному труду, использованию основных современных протоколов и грамотной аренде серверов проект способен предоставить максимально качественное VPN-подключение за минимальную стоимость (взгляните сами на цену аналогичных предложений на рынке).

      <i>Ознакомиться с часто задаваемыми вопросами можно по кнопке <b>«FAQ»</b> под данным текстом.</i>
    faq_info: |-
      💬 <b>Сколько стоит подписка?</b>
      Стоимость базовой подписки составляет 200₽ в месяц.

      💬 <b>Что я получаю за эту стоимость?</b>
      VPN-соединение на максимальной скорости без лимита по трафику на всех серверах проекта. Число VPN-подключений также не ограничено в рамках разумного! А еще будут доступны дополнительные функции бота.

      💬 <b>Как происходит подключение?</b>
      Бот в режиме вопрос-ответ узнает у Вас необходимую информацию, присылает инструкцию и конфигурацию. Вам необходимо скачать приложение из официального магазина (PlayMarket или App Store) и, следуя инструкции, добавить конфигурацию (обычно нужно просто отсканировать QR-код).

      💬 <b>Стоимость подписки фиксированная?</b>
      Нет, стоимость подписки зависит от ее типа, их существует несколько. К примеру, тестировщикам и некоторым другим доступна подписка по сниженной цене. Окончательная стоимость подписки будет отображена после ввода реферального промокода.

      💬 <b>Доступны ли сервисы по типу ChatGPT с данным VPN?</b>
      Конечно доступны! Не забудьте указать их использование при ответе на вопросы бота при создании конфигурации.

      💬 <b>Какие ОС поддерживаются?</b>
      Сервис доступен на всех возможных операционных системах, включая Android, IOS, Windows, macOS, Linux.

      💬 <b>Какие сервера предоставляются?</b>
      В данный момент доступны четыре сервера:
      1. Нидерланды, Амстердам — скорость до 1 Гб/с, пинг 30 мс.
      2. Латвия, Рига — скорость до 1 Гб/с, пинг 20 мс.
      3. Германия, Нюрнберг — скорость до 500 Мб/с, пинг 40 мс.
      4. США, Кремниевая долина — скорость до 50 Мб/с, пинг 150 мс.
