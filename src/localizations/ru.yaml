      <b>server</b> — alias сервера (напр. <code>nl01</code>, <code>lv01</code>, <code>de01</code>)
      <b>link</b> - если вместо файла нужна ссылка вида <code>vless://</code> или <code>ss://</code>

      <b>Не забываем прикрепить файл, если требуется!</b>
