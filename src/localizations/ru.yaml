other:
  messages:
    hello_message: |-
      👋 <b>Привет! Я бот проекта ksiVPN — безлимитного, быстрого и полностью безопасного VPN-сервиса!</b>

      Я помогу сконфигурировать подключение, оплатить подписку, продлить ее бесплатно, а также решить многие другие задачи! При желании, со мной можно даже обсудить <code>человеческие</code> темы!
    more_info: Больше информации о сервисе можно получить по кнопке <b>«О проекте»</b> в меню под строкой ввода сообщений боту 👇
    help: |-
      ⚙️ <b>Взаимодействовать со мной нужно через Telegram-кнопки, расположенные под строкой написания сообщений</b>
      Если вы их не видите, нажмите на значок «🎛️» справа от строки ввода сообщения или напишите мне команду /start

      🤖 <b>Я перестал воспринимать нажатия на Telegram-кнопки?</b>
      Также воспользуйтесь командой /start!

      🗣 <b>И, конечно, у проекта есть поддержка! Обязательно обращайтесь к ней при возникновении каких-либо проблем</b>
      Telegram — <a href="https://t.me/ksivpn">ссылка</a>
      Яндекс Мессенджер — <a href="https://yandex.ru/chat/p/b3b65d09-78f3-939a-4832-501ce7ee12a6">ссылка</a>
    project_info: |-
      <b>ksiVPN</b> — независимый проект с открытым исходным кодом, созданный одним человеком, уставшим постоянно менять VPN-сервисы и смотреть рекламу ради скорости в 512 Кб/с.

      Отсутствие лишних посредников и использование открытого ПО позволяют проекту уже более четырех лет предлагать быстрое и стабильное VPN-подключение по минимальной цене.

      <i>👇 Ознакомиться с часто задаваемыми вопросами можно по кнопке <b>«FAQ»</b> под данным текстом.</i>
    faq_info: |-
      💬 <b>Сколько стоит подписка?</b>
      Стоимость стандартной подписки составляет 200₽ в месяц. Однако в рамках акций и внутренней реферальной системы стоимость подписки может составлять и 75₽ в месяц!

      💬 <b>Что я получаю за эту стоимость?</b>
      VPN-соединение на максимальной скорости без лимита по трафику на всех серверах проекта!

      💬 <b>Почему так дешево?</b>
      Проект разрабатывается и поддерживается одним инженером. Также проект не создает свой протокол VPN и приложение под него — все базируется на проверенном временем и сообществом ПО с открытым исходным кодом. Оба фактора позволяют сильно экономить на операционных и капитальных расходах — что в итоге и отражается на цене продукта.

      💬 <b>Как происходит подключение?</b>
      Бот в режиме вопрос-ответ узнает у вас необходимую информацию, присылает инструкцию и конфигурацию. Вам необходимо по инструкции скачать приложение из официального магазина (PlayMarket или App Store) и добавить конфигурацию — просто вставить ссылку в приложении.

      💬 <b>Стоимость подписки фиксированная?</b>
      Нет, стоимость подписки зависит от ее типа, их существует несколько. К примеру, тестировщикам и некоторым другим доступна подписка по сниженной цене. Окончательная стоимость подписки будет отображена после ввода реферального промокода.

      💬 <b>Доступны ли сервисы по типу ChatGPT с данным VPN?</b>
      Конечно доступны! Не забудьте указать их использование при ответе на вопросы бота при создании конфигурации.

      💬 <b>Какие ОС поддерживаются?</b>
      Сервис доступен на всех возможных операционных системах, включая Android, IOS, Windows, macOS и Linux.

      💬 <b>Доступен ли обход белых списков?</b>
      В данный момент нет, но данное направление активно прорабатывается в сервисе. Ожидайте скорое обновление!

      💬 <b>Какие локации предоставляются?</b>
      В данный момент доступны следующие локации:
      🇳🇱 Нидерланды, 🇱🇻 Латвия, 🇩🇪 Германия, 🇺🇸 США, 🇪🇸 Испания, 🇵🇱 Польша.
