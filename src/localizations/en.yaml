      <b>By using the service, you agree to the rules:</b>

      <b>1. It is forbidden to share configurations with other people.</b>
      One configuration can only be used for one of your devices. At the same time, you can request an unlimited number of additional configurations for your use within a reasonable framework.

      <b>2. It is forbidden to download files via torrent clients using a VPN.</b>
      However, the files themselves of the <code>*.torrent</code> extension can be downloaded.
      <i>Example: You want to download the movie, but the website hosting the files is not available from Russia. You turn on the VPN, go to the site and download the file film-example.torrent. Next, you turn off the VPN and start downloading the movie itself in your torrent client.</i>

      <b>3. It is recommended not to use a VPN when it is not necessary.</b>
