    instructions:
      wireguard:
        android: |-
          ⚙️ <b>Instructions for installing WireGuard on Android:</b>
          <b>1.</b> Download and install the official Wireguard app (<a href="https://play.google.com/store/apps/details?id=com.wireguard.android">link to the Play Market</a>).
          <b>2.</b> After launching, click on the <b>«+»</b> icon in the lower right corner of the screen.
          <b>3.</b> Select the option <b>«Create from QR code»</b>/<b>«Scan from QR code»</b>, allow access to the camera and scan the QR code.
          <b>4.</b> Enter the name of your VPN tunnel! You can specify any name, but it is recommended to name the tunnel by the country of location (Netherlands/Germany/Latvia/USA).

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To turn on the VPN, just click on the switch to the right of the tunnel name. For the first time, the phone may issue a notification about adding a new VPN connection - you must agree.
          <b>2.</b> To turn off the VPN, you need to change the switch position again.
        ios: |-
          ⚙️ <b>Instructions for installing WireGuard on iOS:</b>
          <b>1.</b> Download and install the official Wireguard app (<a href="https://apps.apple.com/ru/app/wireguard/id1441195209">link in the App Store</a>).
          <b>2.</b> After launching, click on the <b>«+»</b> icon in the lower right corner of the screen.
          <b>3.</b> Select the option <b>«Create from QR code»</b>/<b>«Scan from QR code»</b>, allow access to the camera and scan the QR code.
          <b>4.</b> Enter the name of your VPN tunnel! You can specify any name, but it is recommended to name the tunnel by the country of location (Netherlands/Germany/Latvia/USA).

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To turn on the VPN, just click on the switch to the right of the tunnel name. For the first time, the phone may issue a notification about adding a new VPN connection - you must agree.
          <b>2.</b> To turn off the VPN, you need to change the switch position again.
        windows: |-
          ⚙️ <b>Instructions for installing WireGuard on Windows:</b>
          <b>1.</b> Download and install the Wireguard app (<a href="https://www.wireguard.com/install/">link to the official website</a>).
          <b>2.</b> After launching, click <b>«Add tunnel»</b>/<b>«Add tunnel»</b> and select the extension file <code>*.conf</code> sent to you.

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To enable VPN, just select a tunnel and click <b>«Connect»</b>.
          <b>2.</b> To turn off the VPN, just click <b>«Disable»</b>.
        macos: |-
          ⚙️ <b>Instructions for installing WireGuard on macOS:</b>
          <b>1.</b> Download and install the official Wireguard app (<a href="https://apps.apple.com/ru/app/wireguard/id1451685025">link in the App Store</a>).
          <b>2.</b> After launching, click <b>«Add tunnel»</b>/<b>«Add tunnel»</b> and select the extension file <code>*.conf</code> sent to you.

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To enable VPN, just select a tunnel and click <b>«Connect»</b>.
          <b>2.</b> To turn off the VPN, just click <b>«Disable»</b>.
        linux: "⚙️ <b>Instructions for installing and using WireGuard on GNU/Linux:</b>\nOh, you're not little anymore, since you're using Linux!\nI send you great respect and a link to the documentation: https://www.wireguard.com/install/#ubuntu-module-tools\n\nInstallation instructions can be also found here: https://shrub-coriander-4a3.notion.site/Linux-Mint-Cinnamon-21-1-29cda1060f4d4ab48c483cfa70948e46?pvs=4 "
      xray vless xtls-reality:
        android: |-
          ⚙️ <b>Instructions for installing XTLS-Reality on Android:</b>
          <b>1.</b> Download and install the official v2rayNG app (<a href="https://play.google.com/store/apps/details?id=com.v2ray.ang">link to the Play Market</a>).
          <b>2.</b> After launching, click on the <b>«+»</b> icon next to the Profile.
          <b>3.</b> Select <b>«Import profile from QR code»</b>, allow access to the camera and scan the QR code.

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To turn on the VPN, just click on the switch in the lower right corner.For the first time, the phone may issue a notification about adding a new VPN connection — you must agree.
          <b>2.</b> To turn off the VPN, you need to change the switch position again.
        ios: |-
          ⚙️ <b>Instructions for installing XTLS-Reality on iOS:</b>
          <b>1.</b> Download and install the official Streisand app (<a href="https://apps.apple.com/ru/app/streisand/id6450534064">link in the App Store</a>).
          <b>2.</b> After launching, click on the <b>«+»</b> in the upper right corner of the application.
          <b>3.</b> Select <b>«Scan QRcode»</b> from the drop-down menu, allow access to the camera and scan the sent QR code.

          🎉 <b>Instructions for use:</b>
          <b>1.To turn on the VPN, just click on the switch at the top in the center of the screen.
          For the first time, the phone may issue a notification about adding a new VPN connection — you must agree.
          <b>2.</b> To turn off the VPN, you need to change the switch position again.
        windows: |-
          ⚙️ <b>Instructions for installing XTLS-Reality on Windows:</b>
          <b>1.</b> Upgrade to the latest release of the nekoray app <a href="https://github.com/MatsuriDayo/nekoray/releases/tag/3.21">by the link</a>.
          <b>2.</b> Download the Windows version.
          <b>3.</b> Unzip the archive (<b>RMB archive</b> — <b>«Extract all...»</b> — <b>«Extract»</b>)
          <b>4.</b> Run the file in the archive <b>nekoray.exe </b>.
          <b>5.</b> At the first launch, Windows will notify you that the application is being released by an unknown publisher. Don't be scared, NekoBox is an open source application. <b>It is completely safe and does not carry any viruses.</b>
          <b>6.</b> To continue, click <b>«More details»</b> — <b>«Execute anyway»</b>.
          <b>7.</b> Select <b>«sing-box»</b> in the start dialog box.
          <b>8.</b> Copy the link given to you and hold <b>Ctrl+V</b> in the application. The configuration will be added automatically.

          🎉 <b>Instructions for use:</b>
          <b>1.</b> <u>Before switching on, be sure to select <b>«TUN mode»</b>. To do this, you will need to restart the program as an administrator.</u>
          <b>2.</b> You can enable and disable VPN in the program itself or in the tray.
        macos: |-
          ⚙️ <b>Instructions for installing XTLS-Reality on macOS:</b>
          <b>1.</b> Download and install the official FoXray app (<a href="https://apps.apple.com/ru/app/foxray/id6448898396">link in the App Store</a>).
          <b>2.</b> After launching, click on the <b>Notepad icon</b> and paste the link sent to you.

          🎉 <b>Instructions for use:</b>
          <b>1.</b> To enable VPN, just click on the switch to the right of the configuration name.For the first time, the device may issue a notification about adding a new VPN connection — It is necessary to agree.
          <b>2.</b> To turn off the VPN, you need to change the switch position again.
        linux: "⚙️ <b>Instructions for installing and using XTLS-Reality on GNU/Linux:</b>\nOh, you're not little anymore, since you use Linux!\nI send you great respect and a link to the documentation: https://github.com/MatsuriDayo/nekoray/tree/3.21 "
