other:
  messages:
    hello_message: |-
      👋 <b>Hi! I am a bot of the ksiVPN project — an unlimited, fast and completely secure VPN service for 200</b>₽<b>/month!</b>

      I will help you configure the connection, pay for the subscription, extend it for free, as well as solve many other tasks! If desired, you can even discuss <code>human</code> topics with me!
    more_info: More information about the service is available by clicking the <b>«About project»</b> button from below 👇
    help: |-
      You can easily write to my creator if you have any problems, as well as if you have ideas to improve my work!

      <b>If I do not perceive button clicks, reset my state using the /start command</b>
    project_info: Unlimited, fast and completely secure service that allows you to establish a VPN connection in various countries of the world through your own VPS for 200₽ per month.
    service_info: Unlimited, fast and completely secure service that allows you to establish a VPN connection in various countries of the world through your own VPS for 200₽ per month.
    faq_info: |-
      💬 <b>How much does the subscription cost?</b>
      The cost of a basic subscription is 200rubles per month.

      💬 <b>What do I get for this cost?</b>
      VPN connection at maximum speed with no traffic limit on all project servers. The number of VPN connections is also unlimited within reason! And additional bot functions will be available.

      💬 <b>How does the connection work?</b>
      Registration is done in one click — the bot will only ask for a referral promo code, which is not necessary to enter. Next, the bot will send a link to the subscription with detailed instructions. You will need to download the app from the official store (PlayMarket or App Store) and add a subscription by simply clicking on the link from the instructions.

      💬 <b>Is the subscription price fixed?</b>
      No, the cost of a subscription depends on its type, there are several of them. For example, a discounted subscription is available to testers and some others. The final subscription price will be displayed after entering the referral promo code.

      💬 <b>Are ChatGPT-type services available with this VPN?</b>
      Of course they are available! Moreover, some locations allow you to bypass even extremely strict site restrictions — from such servers you can access Gemini registration, view Reddit without logging into your account, and so on.

      💬 <b>Which operating systems are supported?</b>
      The service is available on all possible operating systems, including Android, iOS, Windows, macOS, Linux.

      💬 <b>Which servers are provided?</b>
      There are currently four servers available:
      1. Netherlands, Amsterdam — speed up to 1 Gb/s, ping 30 ms.
      2. Latvia, Riga — speed up to 1 Gb/s, ping 20 ms.
      3. Germany, Nuremberg — speed up to 500 Mb/s, ping 40 ms.
      4. USA, Silicon Valley — speed up to 50 Mb/s, ping 150 ms.
    chatgpt_error: Sorry, an error with ChatGPT mode occurred
    chatgpt_only_for_active_sub: ChatGPT mode is available only to clients with an active subscription!
    unrecognized_message: |-
      <b>Sorry, I don't understand you</b> 🤔

      If I do not perceive button clicks, reset my state using the /start command.
    restart: <i>Oh, oh! Rebooting</i>
